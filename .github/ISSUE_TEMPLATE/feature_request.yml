assignees: []
---

## Problem

What problem does this solve? What user pain is unaddressed?

> "I want to do X, but LeakWatch doesn't let me because Y."

## Proposed solution

Describe the feature in 1–3 paragraphs. Include:

- Which module (watch / phone / both)
- UI / data flow sketch (text is fine)
- Any new dependencies (HMS Kits, libraries) — and **why** they're needed
- Battery-budget impact: how will the feature affect the `< 0.5%/24h` watch drain target?

## Alternatives considered

What other approaches did you think about? Why this one?

## Acceptance criteria

- [ ] Criterion 1
- [ ] Criterion 2
- [ ] Criterion 3

## Out of scope

What this feature explicitly will NOT do (helps scope the discussion).

## Additional context

Screenshots, mockups, references to similar features in other apps, links to HMS docs.
