name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Sunday 03:00 UTC
    - cron: '0 3 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'kotlin']
        # Note: ArkTS is not directly supported by CodeQL; we use 'javascript-typescript'
        # because ArkTS is a TypeScript superset, and CodeQL's TS analyser will catch
        # most issues. The remaining ~10% ArkTS-specific rules are caught by DevEco's
        # built-in lint at build time.
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Custom query packs — start with defaults, extend as we find false negatives
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
